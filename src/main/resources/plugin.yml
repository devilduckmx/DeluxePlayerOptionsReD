name: DeluxePlayerOptionsReD
version: ${project.version}
main: net.redm1ne.deluxeplayeroptionsred.DeluxePlayerOptions
api-version: 1.16
author: ReDM1ne
description: Advanced player options for lobby servers. Unified JAR version.
website: https://redm1ne.net
softdepend:
  - PlaceholderAPI
  - icJukeBox
  - JukeBox
  - PlayerPoints
  - Vault

commands:
  playeroptions:
    description: Main command for DeluxePlayerOptionsReD
    usage: /<command> [reload|help]
    aliases: [po, dpo, deluxeplayeroptions]
    permission: playeroptions.admin
  options:
    description: Open the player options menu
    usage: /<command>
    aliases: [opt]
    permission: playeroptions.use
  speed:
    description: Toggle speed mode
    usage: /<command>
    aliases: [spe]
    permission: playeroptions.speed
  fly:
    description: Toggle fly mode
    usage: /<command>
    aliases: [fl]
    permission: playeroptions.fly
  jump:
    description: Toggle jump boost
    usage: /<command>
    aliases: [jum]
    permission: playeroptions.jump
  doublejump:
    description: Toggle double jump
    usage: /<command>
    aliases: [djum]
    permission: playeroptions.doublejump
  stacker:
    description: Toggle stacker mode
    usage: /<command>
    aliases: [stak]
    permission: playeroptions.stacker
  visibility:
    description: Toggle player visibility
    usage: /<command>
    aliases: [visi]
    permission: playeroptions.visibility
  chat:
    description: Toggle chat visibility
    usage: /<command>
    aliases: [cha]
    permission: playeroptions.chat
  radio:
    description: Toggle radio
    usage: /<command>
    aliases: [ra]
    permission: playeroptions.radio
  pvp:
    description: Toggle PvP mode
    usage: /<command>
    aliases: [playervsplayer]
    permission: playeroptions.pvp

permissions:
  playeroptions.admin:
    description: Admin permission for reload and other admin commands
    default: op
  playeroptions.use:
    description: Permission to use the options menu
    default: true
  playeroptions.speed:
    description: Permission to use speed option
    default: true
  playeroptions.fly:
    description: Permission to use fly option
    default: true
  playeroptions.jump:
    description: Permission to use jump boost option
    default: true
  playeroptions.doublejump:
    description: Permission to use double jump option
    default: true
  playeroptions.stacker:
    description: Permission to use stacker option
    default: true
  playeroptions.visibility:
    description: Permission to use visibility option
    default: true
  playeroptions.chat:
    description: Permission to use chat option
    default: true
  playeroptions.radio:
    description: Permission to use radio option
    default: true
  playeroptions.pvp:
    description: Permission to use PvP option
    default: true
  playeroptions.visibility.vip:
    description: Always visible to other players
    default: op
